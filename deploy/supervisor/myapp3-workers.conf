[program:myapp3-reverb]
process_name=%(program_name)s
directory=/var/www/myapp3
command=/usr/bin/php artisan reverb:start --host=0.0.0.0 --port=8080
autostart=true
autorestart=true
startsecs=5
startretries=3
stopsignal=TERM
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=false
stdout_logfile=/var/www/myapp3/storage/logs/supervisor/reverb.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=10
stderr_logfile=/var/www/myapp3/storage/logs/supervisor/reverb-error.log
stderr_logfile_maxbytes=20MB
stderr_logfile_backups=10

[program:myapp3-queue]
process_name=%(program_name)s
directory=/var/www/myapp3
command=/usr/bin/php artisan queue:work --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
startsecs=5
startretries=3
stopsignal=TERM
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=false
stdout_logfile=/var/www/myapp3/storage/logs/supervisor/queue.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=10
stderr_logfile=/var/www/myapp3/storage/logs/supervisor/queue-error.log
stderr_logfile_maxbytes=20MB
stderr_logfile_backups=10
